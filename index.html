<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Git Test Projesi</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .box {
            text-align: center;
            padding: 30px
            border: 2px solid white;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 Git Test Başarılı</h1>
        <p>Repo düzgün çalışıyor mu diye kontrol ediyoruz.</p>
        <button onclick="alert('Git + GitHub çalışıyor!')">Test Et</button>
    </div>

</body>
</html>
