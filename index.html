<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Test Projesi</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .box {
            text-align: center;
            padding: 30px;
            border: 2px solid white;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background-color: white;
            color: #1e3c72;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #e0e0e0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Git Test Başarılı!</h1>
        <p>Repo düzgün çalışıyor mu diye kontrol ediyoruz.</p>
        <button onclick="alert('Git + GitHub sorunsuz çalışıyor!')">Test Et</button>
    </div>

</body>
</html>
